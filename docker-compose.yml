services:
  app:
    image: ${IMAGE_REPOSITORY:-ghcr.io/zdtzn/infinite-canvas}:${IMAGE_TAG:-latest}
    container_name: infinite-canvas
    ports:
      - "3000:3000"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      JOB_CONCURRENCY: ${JOB_CONCURRENCY:-2}
      UPSTREAM_TIMEOUT_MS: ${UPSTREAM_TIMEOUT_MS:-600000}
      MAX_USER_ASSET_BYTES: ${MAX_USER_ASSET_BYTES:-2147483648}
      ANALYTICS_GA4_ID: ${ANALYTICS_GA4_ID:-}
      ANALYTICS_BAIDU_ID: ${ANALYTICS_BAIDU_ID:-}
    volumes:
      - infinite-canvas-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1:3000/health');if(!r.ok)process.exit(1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  caddy:
    image: caddy:2.10-alpine
    profiles: ["https"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  infinite-canvas-data:
  caddy-data:
  caddy-config:
