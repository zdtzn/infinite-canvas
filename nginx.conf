proxy_cache_path /var/cache/nginx/prompt levels=1:2 keys_zone=prompt_cache:10m max_size=256m inactive=7d use_temp_path=off;

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 运行期配置由容器启动时生成，禁止缓存，确保改环境变量后即时生效。
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    location ^~ /prompt-proxy/raw/ {
        proxy_ssl_server_name on;
        proxy_set_header Host cdn.jsdelivr.net;
        rewrite ^/prompt-proxy/raw/([^/]+)/([^/]+)/([^/]+)/(.*)$ /gh/$1/$2@$3/$4 break;
        proxy_pass https://cdn.jsdelivr.net;
        proxy_cache prompt_cache;
        proxy_cache_valid 200 7d;
    }

    location ^~ /prompt-proxy/pbs/ {
        proxy_ssl_server_name on;
        proxy_set_header Host pbs.twimg.com;
        proxy_pass https://pbs.twimg.com/;
        proxy_cache prompt_cache;
        proxy_cache_valid 200 7d;
    }

    location ^~ /prompt-proxy/shields/ {
        proxy_ssl_server_name on;
        proxy_set_header Host img.shields.io;
        proxy_pass https://img.shields.io/;
        proxy_cache prompt_cache;
        proxy_cache_valid 200 7d;
    }

    location ^~ /prompt-proxy/star-history/ {
        proxy_ssl_server_name on;
        proxy_set_header Host api.star-history.com;
        proxy_pass https://api.star-history.com/;
        proxy_cache prompt_cache;
        proxy_cache_valid 200 7d;
    }

    location ^~ /prompt-proxy/awesome/ {
        proxy_ssl_server_name on;
        proxy_set_header Host awesome.re;
        proxy_pass https://awesome.re/;
        proxy_cache prompt_cache;
        proxy_cache_valid 200 7d;
    }

    location ^~ /prompt-proxy/atomgit/ {
        proxy_ssl_server_name on;
        proxy_set_header Host atomgit.com;
        proxy_pass https://atomgit.com/;
        proxy_cache prompt_cache;
        proxy_cache_valid 200 7d;
    }

    location ~* \.(?:js|css|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
